<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Palindrome Checker</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="projectNav"><a href="index.html">Home</a></div>

	<h1>We can check the words!</h1>

	<div id="UI">
		<input type="text" id="inputString" placeholder="back words?">
		<button id="theButton">Check</button>
		<p id="feedback">the feedback here…</p>
	</div>

	<script>

		const theFeedback = document.getElementById("feedback");
		theFeedback.innerHTML = "write your question"

		const theButton = document.getElementById("theButton");
		theButton.addEventListener("click", checkTheText);

		function checkTheText(){

			const theInput = document.getElementById("inputString");

			if(theInput.value == "machin"){
				theFeedback.innerHTML = "Error: input is a thing";
			}
			else if ( theInput.value == ""){
				theFeedback.innerHTML = "Fill in the form, dummy.";
			}
			else if ( checkPalindrome(theInput.value) == true){
				theFeedback.innerHTML = "Yes, " + theInput.value + " is a palindrome";
			}
			else{
				theFeedback.innerHTML = "No, " + theInput.value + " is not a palindrome";
			}

			theInput.value = ""; //vider après usage
		}// checkTheText

		function checkPalindrome(str){

			str = str.replaceAll(" ", "")
			str = str.toLowerCase();
			str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

			let theLetters = str.split("");
			let verlan = theLetters.reverse();
			let rts = verlan.join("");

			console.log(rts)

			if(str == rts){
				return true;
			}
			else{
				return false;
			}
		}

	</script>
</body>
</html>
